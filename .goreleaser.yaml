# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2

before:
  hooks:
    - go mod tidy
    - go get -v
    - rm -rf dist
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"
archives:
  - format_overrides:
      - goos: windows
        formats: ["zip"]
checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ .Tag }}"
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
release:
  github:
    owner: davegallant
    name: vpngate

# Check https://goreleaser.com/customization/homebrew/
brews:
  - homepage: "https://github.com/davegallant/homebrew-public"
    description: "a client for vpngate.net"
    directory: Formula
    commit_author:
      name: davegallant
      email: davegallant@gmail.com
    repository:
      owner: davegallant
      name: homebrew-public

# Check https://goreleaser.com/customization/winget/
winget:
  - name: vpngate
    publisher: davegallant
    package_identifier: davegallant.vpngate
    short_description: "a client for vpngate.net"
    license: "GPL-3.0-or-later"
    license_url: "https://github.com/davegallant/vpngate/blob/main/LICENSE"
    homepage: "https://github.com/davegallant/vpngate"
    commit_author:
      name: davegallant
      email: davegallant@gmail.com
    tags:
      - vpn
      - openvpn
      - cli
    # Dry run only: writes the manifest to dist/ but does not push or open a
    # PR. Flip to false once davegallant/winget-pkgs and the release token
    # are confirmed to work end to end.
    skip_upload: true
    repository:
      owner: davegallant
      name: winget-pkgs
      branch: "{{.ProjectName}}-{{.Version}}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
